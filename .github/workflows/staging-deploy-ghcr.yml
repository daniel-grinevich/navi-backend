name: Deploy staging to GHCR

on:
  push:
    tags:
      - 'staging'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      short-sha: ${{ steps.sha.outputs.short-sha }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Get short SHA
        id: sha
        run: echo "short-sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging-latest
            type=raw,value=staging-${{ steps.sha.outputs.short-sha }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./compose/staging/django/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  update-manifests:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rainbow-road
        uses: actions/checkout@v5
        with:
          repository: daniel-grinevich/rainbow-road
          token: ${{ secrets.RAINBOW_ROAD_PAT }}

      - name: Update staging image tag
        run: |
          cd navi/staging
          sed -i 's/newTag: staging-.*/newTag: staging-${{ needs.build-and-push-image.outputs.short-sha }}/' kustomization.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add navi/staging/kustomization.yaml
          git commit -m "deploy staging: ${{ needs.build-and-push-image.outputs.short-sha }}"
          git push
